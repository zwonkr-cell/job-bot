name: Job Alert Bot

on:
  schedule:
    # 주간(KST 06:00~20:59): 30분 간격 / 야간(KST 21:00~05:00): 2시간 간격
    - cron: '*/30 21-23 * * *'   # UTC 21~23시 = KST 06:00~08:59
    - cron: '*/30 0-11 * * *'    # UTC 00~11시 = KST 09:00~20:59
    - cron: '0 12-20/2 * * *'    # UTC 12,14,16,18,20시 = KST 21,23,01,03,05시
  workflow_dispatch: # 직접 실행해볼 수 있는 버튼 생성

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 파일 수정을 위한 권한
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bot
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          SHEET_WEBHOOK_URL: ${{ secrets.SHEET_WEBHOOK_URL }}
        run: python job_bot.py

      - name: Update DB
        if: always()   # 오류로 봇이 중단돼도 상태(하트비트/오류 타임스탬프)는 저장
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add processed_ids.txt bot_state.json
          git commit -m "Update state" || exit 0
          git push
